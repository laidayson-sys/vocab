<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뽀로로 운전면허증 Mock</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 24px;
    }
    h1 { font-size: 1.4rem; color: #1a202c; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    button { padding: 8px 18px; border: none; border-radius: 8px; background: #3b82f6; color: white; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #2563eb; }
    button.active { background: #1d4ed8; outline: 2px solid #93c5fd; }
    #license-card {
      width: 420px; height: 260px; border-radius: 18px; padding: 18px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      background: linear-gradient(135deg, #bfdbfe 0%, #dbeafe 100%);
      position: relative; overflow: hidden; transition: filter 0.3s, opacity 0.3s;
    }
    #license-card::before {
      content: "MOCK  MOCK  MOCK  MOCK  MOCK  MOCK";
      position: absolute; top: 50%; left: -30px; white-space: nowrap;
      font-size: 11px; letter-spacing: 8px; color: rgba(30,64,175,0.10);
      transform: rotate(-30deg); pointer-events: none;
    }
    .card-header { font-size: 11px; font-weight: 700; color: #1e3a8a; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .card-body { display: flex; gap: 16px; }
    .photo-box { width: 88px; height: 112px; background: #93c5fd; border-radius: 6px; border: 2px solid #1d4ed8; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0; }
    .photo-box .caption { font-size: 9px; color: #1e3a8a; margin-top: 4px; font-weight: 600; }
    .info { font-size: 11.5px; color: #1e3a8a; line-height: 1.9; }
    .info .label { font-size: 9px; color: #3b82f6; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .info .value { font-weight: 600; color: #1e3a8a; }
    .license-num { margin-top: 14px; font-size: 10px; color: #1e3a8a; letter-spacing: 1.5px; font-family: monospace; font-weight: 700; }
    .issuer { position: absolute; bottom: 14px; right: 18px; font-size: 9px; color: #3b82f6; font-weight: 700; }
    #license-card.blur { filter: blur(3px); }
    #license-card.low { opacity: 0.55; filter: contrast(0.7) brightness(1.2); }
    #license-card.occlusion::after { content: ""; position: absolute; background: #111; width: 110px; height: 22px; top: 64px; left: 118px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>🐧 뽀로로 운전면허증 Mock</h1>
  <div id="license-card">
    <div class="card-header"><span>🇰🇷</span> 대한민국 운전면허증 &nbsp;|&nbsp; REPUBLIC OF KOREA DRIVER LICENSE</div>
    <div class="card-body">
      <div class="photo-box">🐧<div class="caption">PORORO</div></div>
      <div class="info">
        <div><span class="label">이름 / Name</span><br/><span class="value">뽀로로 &nbsp; PORORO</span></div>
        <div><span class="label">생년월일 / DOB</span><br/><span class="value">2003-01-27</span></div>
        <div><span class="label">주소 / Address</span><br/><span class="value">북극 뽀로로마을 1번지</span></div>
        <div><span class="label">종별 / Class</span><span class="value">&nbsp;1종 보통 (설매 전용)</span></div>
      </div>
    </div>
    <div class="license-num">면허번호: 00-03-000001-뽀</div>
    <div class="issuer">발급기관: 북극 경찰청</div>
  </div>
  <div class="controls">
    <button onclick="setMode('')" id="btn-normal">Normal</button>
    <button onclick="setMode('blur')" id="btn-blur">Blur</button>
    <button onclick="setMode('low')" id="btn-low">Low Quality</button>
    <button onclick="setMode('occlusion')" id="btn-occlusion">Occlusion</button>
    <button onclick="downloadCard()">⬇ Download PNG</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    function setMode(mode) {
      document.getElementById('license-card').className = mode;
      ['normal','blur','low','occlusion'].forEach(m => document.getElementById('btn-'+(m||'normal'))?.classList.remove('active'));
      document.getElementById('btn-'+(mode||'normal'))?.classList.add('active');
    }
    function downloadCard() {
      html2canvas(document.getElementById('license-card'), { scale: 2 }).then(canvas => {
        const a = document.createElement('a'); a.download = 'pororo_license_mock.png'; a.href = canvas.toDataURL(); a.click();
      });
    }
    document.getElementById('btn-normal').classList.add('active');
  </script>
</body>
</html>
