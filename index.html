<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="外贸英语">
<meta name="theme-color" content="#007AFF">
<meta name="description" content="玩具外贸行业英语词汇学习工具">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192x192.png">
<title>玩具外贸英语</title>
<style>
  :root {
    --bg: #F2F2F7;
    --bg2: #FFFFFF;
    --bg3: #E5E5EA;
    --label: #000000;
    --label2: #3C3C43CC;
    --label3: #3C3C4399;
    --separator: #C6C6C8;
    --blue: #007AFF;
    --green: #34C759;
    --red: #FF3B30;
    --orange: #FF9500;
    --gray: #8E8E93;
    --radius: 16px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--label);
    min-height: 100%;
    min-height: -webkit-fill-available;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ========== SCREENS ========== */
  .screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    -webkit-transform: translateX(30px);
    transform: translateX(30px);
    -webkit-transition: opacity 0.3s ease, -webkit-transform 0.3s ease;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }
  .screen.slide-out {
    opacity: 0;
    transform: translateX(-30px);
  }

  /* ========== NAV BAR ========== */
  .navbar {
    padding-top: calc(var(--safe-top) + 8px);
    padding-bottom: 12px;
    padding-left: 20px;
    padding-right: 20px;
    background: rgba(242,242,247,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }
  .navbar h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }
  .navbar .large-title {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-top: 4px;
  }
  .navbar-back {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--blue);
    font-size: 17px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    font-family: inherit;
  }
  .navbar-back svg { margin-top: 1px; }

  /* ========== SCROLL AREA ========== */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(var(--safe-bottom) + 80px);
  }

  /* ========== HOME SCREEN ========== */
  .home-header {
    padding: 0 20px 16px;
  }
  .home-header .greeting {
    font-size: 15px;
    color: var(--gray);
    margin-bottom: 4px;
  }
  .home-header .title {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 0 20px 20px;
  }
  .stat-card {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    text-align: center;
  }
  .stat-number {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-number.blue { color: var(--blue); }
  .stat-number.green { color: var(--green); }
  .stat-number.orange { color: var(--orange); }
  .stat-label {
    font-size: 11px;
    color: var(--gray);
    font-weight: 500;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray);
    padding: 0 36px 8px;
  }

  .category-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .category-item {
    background: var(--bg2);
    border-radius: 0;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .category-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
  .category-item:last-child { border-radius: 0 0 var(--radius) var(--radius); }
  .category-item:only-child { border-radius: var(--radius); }
  .category-item:active { background: var(--bg3); }
  .category-item::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 60px;
    right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .category-item:last-child::after { display: none; }

  .cat-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .cat-info { flex: 1; min-width: 0; }
  .cat-name {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }
  .cat-sub {
    font-size: 13px;
    color: var(--gray);
    margin-top: 1px;
  }
  .cat-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .cat-count {
    font-size: 15px;
    color: var(--gray);
  }
  .cat-progress-ring {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  .cat-chevron {
    color: var(--separator);
    font-size: 13px;
    font-weight: 600;
    margin-left: 2px;
  }

  /* ========== CATEGORY SCREEN ========== */
  .cat-hero {
    padding: 0 20px 20px;
  }
  .cat-hero-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin-bottom: 12px;
  }
  .cat-hero-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .cat-hero-sub {
    font-size: 15px;
    color: var(--gray);
    margin-top: 2px;
  }
  .cat-hero-stats {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }
  .cat-hero-stat {
    font-size: 13px;
    color: var(--gray);
  }
  .cat-hero-stat span {
    color: var(--label);
    font-weight: 600;
  }

  .action-btns {
    padding: 0 20px 20px;
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    height: 50px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { opacity: 0.75; transform: scale(0.98); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-secondary { background: var(--bg3); color: var(--label); }

  /* word list */
  .word-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .word-item {
    background: var(--bg2);
    border-radius: 0;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    gap: 12px;
  }
  .word-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
  .word-item:last-child { border-radius: 0 0 var(--radius) var(--radius); }
  .word-item:only-child { border-radius: var(--radius); }
  .word-item:active { background: var(--bg3); }
  .word-item::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 16px;
    right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .word-item:last-child::after { display: none; }
  .word-en {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
    min-width: 0;
  }
  .word-cn {
    font-size: 14px;
    color: var(--gray);
    text-align: right;
    flex-shrink: 0;
  }
  .word-known-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--separator);
  }
  .word-known-dot.known { background: var(--green); }

  /* ========== STUDY SCREEN (judgment + detail + spelling) ========== */
  .study-progress-bar {
    height: 4px;
    background: var(--bg3);
    margin: 0 20px;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .study-progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .study-counter {
    text-align: center;
    font-size: 13px;
    color: var(--gray);
    padding: 10px 20px 0;
    font-weight: 500;
    flex-shrink: 0;
  }

  /* Phase: judge — show word only */
  .judge-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .judge-word {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-align: center;
    line-height: 1.3;
    color: var(--label);
    margin-bottom: 12px;
  }
  .judge-blur {
    width: 200px;
    height: 18px;
    border-radius: 9px;
    background: var(--bg3);
    margin-bottom: 6px;
    opacity: 0.5;
  }
  .judge-blur-sm {
    width: 140px;
    height: 14px;
    border-radius: 7px;
    background: var(--bg3);
    opacity: 0.35;
  }
  .judge-hint {
    position: absolute;
    bottom: 100px;
    left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    color: var(--gray);
    line-height: 1.6;
    opacity: 0.6;
  }

  /* 3-button bar */
  .judge-buttons {
    padding: 0 20px;
    padding-bottom: calc(var(--safe-bottom) + 16px);
    display: flex;
    gap: 0;
    flex-shrink: 0;
  }
  .judge-btn {
    flex: 1;
    height: 56px;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: opacity 0.12s, transform 0.1s;
  }
  .judge-btn:active { opacity: 0.6; transform: scale(0.95); }
  .judge-btn .jdot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .judge-btn.j-know { color: var(--green); }
  .judge-btn.j-know .jdot { background: var(--green); }
  .judge-btn.j-fuzzy { color: var(--orange); }
  .judge-btn.j-fuzzy .jdot { background: var(--orange); }
  .judge-btn.j-forgot { color: var(--red); }
  .judge-btn.j-forgot .jdot { background: var(--red); }

  /* Phase: detail — show everything */
  .detail-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 24px;
    padding-bottom: 100px;
  }
  .detail-word-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .detail-word {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--label);
  }
  .detail-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: white;
    flex-shrink: 0;
  }
  .detail-check.green { background: var(--green); }
  .detail-check.orange { background: var(--orange); }
  .detail-check.red { background: var(--red); }
  .detail-cn {
    font-size: 17px;
    color: var(--label);
    margin: 12px 0 4px;
    line-height: 1.5;
  }
  .detail-note {
    font-size: 14px;
    color: var(--gray);
    font-style: italic;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .detail-example {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .detail-example-en {
    font-size: 15px;
    color: var(--label);
    line-height: 1.6;
    margin-bottom: 4px;
  }
  .detail-example-cn {
    font-size: 13px;
    color: var(--gray);
    line-height: 1.5;
  }

  .detail-buttons {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 12px 20px;
    padding-bottom: calc(var(--safe-bottom) + 12px);
    background: rgba(242,242,247,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    display: flex;
    gap: 12px;
    z-index: 20;
  }
  .detail-btn {
    flex: 1;
    height: 48px;
    border-radius: 12px;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: opacity 0.12s, transform 0.1s;
  }
  .detail-btn:active { opacity: 0.7; transform: scale(0.97); }
  .detail-btn-next { background: var(--green); color: white; }
  .detail-btn-wrong { background: #FFEEEE; color: var(--red); }

  /* Phase: spelling test */
  .spell-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .spell-dots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
  }
  .spell-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--bg3);
  }
  .spell-dot.active { background: var(--blue); }
  .spell-dot.correct { background: var(--green); }
  .spell-dot.wrong { background: var(--red); }
  .spell-cn {
    font-size: 18px;
    color: var(--label);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .spell-note {
    font-size: 13px;
    color: var(--gray);
    text-align: center;
    margin-bottom: 32px;
    font-style: italic;
  }
  .spell-input-wrap {
    width: 100%;
    max-width: 320px;
    position: relative;
  }
  .spell-input {
    width: 100%;
    height: 48px;
    border: 2px solid var(--bg3);
    border-radius: 12px;
    background: var(--bg2);
    font-family: inherit;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    color: var(--label);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  .spell-input:focus { border-color: var(--blue); }
  .spell-input.correct { border-color: var(--green); background: #EDFFF3; }
  .spell-input.wrong { border-color: var(--red); background: #FFEEEE; }
  .spell-answer {
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    margin-top: 12px;
    min-height: 22px;
  }
  .spell-controls {
    display: flex;
    gap: 20px;
    margin-top: 28px;
    align-items: center;
  }
  .spell-ctrl-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--bg3);
    background: var(--bg2);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray);
    transition: opacity 0.12s;
  }
  .spell-ctrl-btn:active { opacity: 0.6; }
  .spell-ctrl-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
    align-items: center;
    justify-content: center;
    gap: 40px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--bg2);
    color: var(--blue);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transition: opacity 0.15s;
  }
  .nav-btn:disabled { color: var(--separator); }
  .nav-btn:active { opacity: 0.7; }

  /* ========== COMPLETION SCREEN ========== */
  .completion-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .completion-emoji { font-size: 72px; margin-bottom: 20px; animation: bounce 0.6s ease; }
  @keyframes bounce {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .completion-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .completion-sub {
    font-size: 17px;
    color: var(--gray);
    line-height: 1.5;
    margin-bottom: 32px;
  }
  .completion-stats {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-around;
  }
  .completion-stat { text-align: center; }
  .completion-stat-num {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .completion-stat-num.green { color: var(--green); }
  .completion-stat-num.red { color: var(--red); }
  .completion-stat-label { font-size: 12px; color: var(--gray); margin-top: 2px; }

  /* ========== BOTTOM TAB BAR ========== */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: calc(49px + var(--safe-bottom));
    background: rgba(242,242,247,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--separator);
    display: flex;
    align-items: flex-start;
    padding-top: 8px;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 0 4px;
    transition: opacity 0.15s;
  }
  .tab-item:active { opacity: 0.6; }
  .tab-icon { font-size: 22px; line-height: 1; }
  .tab-label { font-size: 10px; font-weight: 500; color: var(--gray); }
  .tab-item.active .tab-label { color: var(--blue); }
  .tab-item.active .tab-icon { filter: none; }

  /* ========== PROGRESS SCREEN ========== */
  .progress-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .progress-item {
    background: var(--bg2);
    border-radius: 0;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .progress-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
  .progress-item:last-child { border-radius: 0 0 var(--radius) var(--radius); }
  .progress-item::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 60px;
    right: 0;
    height: 0.5px;
    background: var(--separator);
  }
  .progress-item:last-child::after { display: none; }
  .progress-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .progress-info { flex: 1; min-width: 0; }
  .progress-name { font-size: 15px; font-weight: 500; }
  .progress-bar-wrap {
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .progress-pct {
    font-size: 15px;
    font-weight: 600;
    color: var(--gray);
    flex-shrink: 0;
    min-width: 40px;
    text-align: right;
  }

  /* ========== SEARCH SCREEN ========== */

<script>
// 防止 data.js 未加载时崩溃

// ============================================================
// STATE
// ============================================================
let currentTab = 'home';
let currentCategory = null;
let studyCards = [];
let studyIndex = 0;
let studyFlipped = false;
let studyKnown = 0;
let studyAgain = 0;
let history = []; // screen history

// ============================================================
// 艾宾浩斯间隔重复记忆系统 (Ebbinghaus Spaced Repetition System)
// ============================================================

// ---------- 核心常量 ----------
const SRS_INTERVALS = [0, 1, 5, 30, 720, 1440, 4320, 10080, 21600, 43200];
const DAILY_NEW_LIMIT = 20;
const SRS_STORAGE_KEY = 'vocabSRS';
const CHECKIN_STORAGE_KEY = 'vocabCheckin';

// ---------- SRS 数据层 ----------
function loadSRS() {
  try {
    const raw = localStorage.getItem(SRS_STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveSRS() {
  localStorage.setItem(SRS_STORAGE_KEY, JSON.stringify(srsData));
}
let srsData = loadSRS();

function srsKey(catId, cardIdx) {
  return catId + ':' + cardIdx;
}
function getSRS(catId, cardIdx) {
  return srsData[srsKey(catId, cardIdx)] || null;
}

// ---------- 核心算法 ----------
function reviewCard(catId, cardIdx, known) {
  const key = srsKey(catId, cardIdx);
  const now = Date.now();
  let record = srsData[key] || { level: 0, nextReview: now, lastReview: 0, reviewCount: 0 };
  if (known) {
    record.level = Math.min(record.level + 1, SRS_INTERVALS.length - 1);
  } else {
    record.level = 1;
  }
  const intervalMinutes = SRS_INTERVALS[record.level];
  record.nextReview = now + intervalMinutes * 60 * 1000;
  record.lastReview = now;
  record.reviewCount += 1;
  srsData[key] = record;
  saveSRS();
  updateCheckinOnReview(catId, cardIdx);
}

function isCardMastered(catId, cardIdx) {
  const record = getSRS(catId, cardIdx);
  return record ? record.level >= 5 : false;
}
function isCardDueForReview(catId, cardIdx) {
  const record = getSRS(catId, cardIdx);
  if (!record) return false;
  return Date.now() >= record.nextReview;
}
function isCardNew(catId, cardIdx) {
  return !srsData[srsKey(catId, cardIdx)];
}

// ---------- 筛选函数 ----------
function getDueCards(catId) {
  const cat = APP_DATA.find(c => c.id === catId);
  if (!cat) return [];
  const now = Date.now();
  const results = [];
  cat.cards.forEach((card, idx) => {
    const record = getSRS(catId, idx);
    if (record && now >= record.nextReview) {
      results.push({ catId, cardIdx: idx, card, srs: record });
    }
  });
  results.sort((a, b) => a.srs.nextReview - b.srs.nextReview);
  return results;
}
function getAllDueCards() {
  const results = [];
  APP_DATA.forEach(cat => results.push(...getDueCards(cat.id)));
  results.sort((a, b) => a.srs.nextReview - b.srs.nextReview);
  return results;
}
function getNewCards(catId, limit) {
  limit = limit || DAILY_NEW_LIMIT;
  const cat = APP_DATA.find(c => c.id === catId);
  if (!cat) return [];
  const results = [];
  for (let idx = 0; idx < cat.cards.length; idx++) {
    if (isCardNew(catId, idx)) {
      results.push({ catId, cardIdx: idx, card: cat.cards[idx], srs: null });
      if (results.length >= limit) break;
    }
  }
  return results;
}
function getAllNewCards(limit) {
  limit = limit || DAILY_NEW_LIMIT;
  const checkin = loadCheckin();
  const remaining = Math.max(0, limit - (checkin.todayNew || 0));
  if (remaining <= 0) return [];
  const results = [];
  for (const cat of APP_DATA) {
    if (results.length >= remaining) break;
    results.push(...getNewCards(cat.id, remaining - results.length));
  }
  return results;
}

// ---------- 统计函数（兼容原有接口）----------
function getKnownCount(catId) {
  const cat = APP_DATA.find(c => c.id === catId);
  if (!cat) return 0;
  let count = 0;
  for (let i = 0; i < cat.cards.length; i++) {
    if (isCardMastered(catId, i)) count++;
  }
  return count;
}
function isKnown(catId, idx) {
  const record = getSRS(catId, idx);
  return record ? record.level >= 1 : false;
}
function setKnown(catId, idx, known) {
  reviewCard(catId, idx, known);
}
function totalCards() { return APP_DATA.reduce((s, c) => s + c.cards.length, 0); }
function totalKnown() { return APP_DATA.reduce((s, c) => s + getKnownCount(c.id), 0); }

function getCategoryStats(catId) {
  const cat = APP_DATA.find(c => c.id === catId);
  if (!cat) return { total: 0, mastered: 0, learning: 0, newCount: 0, dueCount: 0 };
  let mastered = 0, learning = 0, newCount = 0, dueCount = 0;
  cat.cards.forEach((card, idx) => {
    const record = getSRS(catId, idx);
    if (!record) { newCount++; }
    else if (record.level >= 5) { mastered++; }
    else { learning++; }
    if (record && Date.now() >= record.nextReview) dueCount++;
  });
  return { total: cat.cards.length, mastered, learning, newCount, dueCount };
}
function getGlobalStats() {
  let total = 0, mastered = 0, learning = 0, newCount = 0, dueCount = 0;
  APP_DATA.forEach(cat => {
    const s = getCategoryStats(cat.id);
    total += s.total; mastered += s.mastered; learning += s.learning;
    newCount += s.newCount; dueCount += s.dueCount;
  });
  return { total, mastered, learning, newCount, dueCount };
}

// ---------- 打卡系统 ----------
function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function getYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function loadCheckin() {
  try {
    const raw = localStorage.getItem(CHECKIN_STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : {
      dates: [], streak: 0, todayNew: 0, todayReview: 0, lastDate: ''
    };
    const today = getToday();
    if (data.lastDate !== today) {
      data.todayNew = 0;
      data.todayReview = 0;
      data.lastDate = today;
    }
    return data;
  } catch {
    return { dates: [], streak: 0, todayNew: 0, todayReview: 0, lastDate: '' };
  }
}
function saveCheckin(data) {
  localStorage.setItem(CHECKIN_STORAGE_KEY, JSON.stringify(data));
}
function updateCheckinOnReview(catId, cardIdx) {
  const checkin = loadCheckin();
  const key = srsKey(catId, cardIdx);
  const record = srsData[key];
  if (record && record.reviewCount <= 1) {
    checkin.todayNew += 1;
  } else {
    checkin.todayReview += 1;
  }
  checkin.lastDate = getToday();
  saveCheckin(checkin);
}
function doCheckin() {
  const checkin = loadCheckin();
  const today = getToday();
  const yesterday = getYesterday();
  if (!checkin.dates.includes(today)) {
    checkin.dates.push(today);
    checkin.streak = checkin.dates.includes(yesterday) ? checkin.streak + 1 : 1;
  }
  saveCheckin(checkin);
  return checkin;
}
function getCheckinInfo() {
  const checkin = loadCheckin();
  const today = getToday();
  return {
    streak: checkin.streak,
    todayNew: checkin.todayNew,
    todayReview: checkin.todayReview,
    checkedToday: checkin.dates.includes(today),
    totalDays: checkin.dates.length
  };
}

// ---------- 数据迁移 ----------
function migrateOldProgress() {
  if (localStorage.getItem('srs_migrated') === 'yes') return;
  try {
    const raw = localStorage.getItem('toyEnglishProgress');
    if (!raw) { localStorage.setItem('srs_migrated', 'yes'); return; }
    const oldProgress = JSON.parse(raw);
    const now = Date.now();
    Object.keys(oldProgress).forEach(catId => {
      const indices = Array.isArray(oldProgress[catId]) ? oldProgress[catId] : [];
      indices.forEach(idx => {
        const key = srsKey(catId, idx);
        if (!srsData[key]) {
          srsData[key] = {
            level: 5,
            nextReview: now + 1440 * 60 * 1000,
            lastReview: now,
            reviewCount: 1
          };
        }
      });
    });
    saveSRS();
    localStorage.setItem('srs_migrated', 'yes');
    console.log('旧数据迁移完成！');
  } catch (e) {
    console.error('迁移失败:', e);
  }
}

// APP 启动时自动迁移旧数据
migrateOldProgress();

// ============================================================
// NAVIGATION
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  // Show study screens only when in "home" tab
  ['home','search','progress'].forEach(t => {
    const el = document.getElementById('screen-' + t);
    el.classList.remove('active','slide-out');
  });
  const el = document.getElementById('screen-' + tab);
  el.classList.add('active');

  if (tab === 'progress') renderProgress();
  if (tab === 'home') renderHome();
}

function showScreen(id, pushHistory = true) {
  const screens = document.querySelectorAll('.screen');
  screens.forEach(s => {
    if (s.classList.contains('active')) {
      s.classList.add('slide-out');
      s.classList.remove('active');
      setTimeout(() => s.classList.remove('slide-out'), 350);
    }
  });
  const target = document.getElementById(id);
  target.style.transform = 'translateX(30px)';
  target.style.opacity = '0';
  target.classList.add('active');
  requestAnimationFrame(() => {
    target.style.transform = '';
    target.style.opacity = '';
  });
  if (pushHistory) history.push(id);
}

function goBack() {
  if (history.length <= 1) {
    switchTab(currentTab);
    history = [];
    return;
  }
  history.pop();
  const prev = history[history.length - 1];
  // slide current out to right
  const current = document.querySelector('.screen.active');
  if (current) {
    current.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
    current.style.transform = 'translateX(30px)';
    current.style.opacity = '0';
    current.classList.remove('active');
    setTimeout(() => {
      current.style.transition = '';
      current.style.transform = '';
      current.style.opacity = '';
    }, 300);
  }
  const target = document.getElementById(prev);
  if (target) {
    target.style.transform = 'translateX(-20px)';
    target.style.opacity = '0.5';
    target.classList.add('active');
    requestAnimationFrame(() => {
      target.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
      target.style.transform = 'translateX(0)';
      target.style.opacity = '1';
      setTimeout(() => { target.style.transition = ''; }, 300);
    });
  }
}

// ============================================================
// HOME RENDER (双模式首页)
// ============================================================
let studyMode = 'category'; // 'category' | 'review' | 'new'

function renderHome() {
  const stats = getGlobalStats();
  const checkin = getCheckinInfo();
  const dueCount = stats.dueCount;
  const newAvailable = stats.newCount;
  const todayNewRemaining = Math.max(0, DAILY_NEW_LIMIT - checkin.todayNew);
  const newToShow = Math.min(newAvailable, todayNewRemaining);

  // 时间问候
  const hour = new Date().getHours();
  let greet = '玩具外贸英语';
  if (hour < 6) greet = '夜深了，还在学习';
  else if (hour < 12) greet = '早上好，开始学习吧';
  else if (hour < 18) greet = '下午好，继续加油';
  else greet = '晚上好，坚持就是胜利';
  document.getElementById('home-greeting').textContent = greet;

  // 打卡横幅
  const bannerEl = document.getElementById('checkin-banner');
  const todayTotal = checkin.todayNew + checkin.todayReview;
  if (checkin.streak > 0 || todayTotal > 0) {
    bannerEl.innerHTML = `<div class="checkin-banner"><div class="checkin-flame">🔥</div><div class="checkin-info"><div class="checkin-streak">${checkin.streak || 0}<span> 天连续学习</span></div><div class="checkin-detail">今日已学 ${todayTotal} 词（新词 ${checkin.todayNew}，复习 ${checkin.todayReview}）</div></div></div>`;

// ============================================================
// STUDY LOGIC — 3-phase: Judge → Detail → Spell
// ============================================================
let studyPhase = 'judge'; // 'judge' | 'detail' | 'spell'
let currentJudgment = null; // 'know' | 'fuzzy' | 'forgot'
let spellQueue = [];    // words to spell-test
let spellIndex = 0;
let spellResults = [];  // track correct/wrong per spell word
const SPELL_EVERY = 10; // trigger spell test every N words
let wordsSinceSpell = 0;

function startStudy(id, shuffle) {
  const cat = APP_DATA.find(c => c.id === id);
  if (!cat) return;
  currentCategory = cat;
  studyCards = cat.cards.map((card, i) => ({ ...card, originalIndex: i }));
  if (shuffle) shuffleArray(studyCards);
  beginStudy();
}

function startStudyAt(id, index) {
  const cat = APP_DATA.find(c => c.id === id);
  if (!cat) return;
  currentCategory = cat;
  studyCards = cat.cards.map((card, i) => ({ ...card, originalIndex: i }));
  studyCards = [...studyCards.slice(index), ...studyCards.slice(0, index)];
  beginStudy();
}

function beginStudy() {
  studyIndex = 0;
  studyFlipped = false;
  studyKnown = 0;
  studyAgain = 0;
  wordsSinceSpell = 0;
  spellQueue = [];

  document.getElementById('study-title').textContent = currentCategory.name;
  document.getElementById('completion-view').style.display = 'none';
  document.getElementById('study-main').style.display = 'flex';
  document.getElementById('study-main').style.flexDirection = 'column';

  showScreen('screen-study');
  showJudge();
}

// ---------- Phase 1: Judge ----------
function showJudge() {
  if (studyIndex >= studyCards.length) {
    // Before completion, do a final spell test if there are unspelled words
    if (spellQueue.length > 0) {
      startSpellTest();
      return;
    }
    showCompletion();
    return;
  }

  studyPhase = 'judge';
  const card = studyCards[studyIndex];
  const total = studyCards.length;
  const pct = total ? (studyIndex / total * 100) : 0;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('study-counter').textContent = (studyIndex + 1) + ' / ' + total;
  document.getElementById('judge-word').textContent = card.en;

  document.getElementById('phase-judge').style.display = 'flex';
  document.getElementById('phase-detail').style.display = 'none';
  document.getElementById('phase-spell').style.display = 'none';
}

function onJudge(result) {
  currentJudgment = result;
  const card = studyCards[studyIndex];
  const catId = card._catId || currentCategory.id;

  // Update SRS based on judgment
  if (result === 'know') {
    reviewCard(catId, card.originalIndex, true);
    studyKnown++;
  } else if (result === 'forgot') {
    reviewCard(catId, card.originalIndex, false);
    studyAgain++;
  } else {
    // fuzzy: do a half-step — treat as known but with lower confidence
    reviewCard(catId, card.originalIndex, true);
    // Reduce the level by 0.5 (capped at 1)
    const key = srsKey(catId, card.originalIndex);
    if (srsData[key] && srsData[key].level > 1) {
      srsData[key].level = Math.max(1, srsData[key].level - 1);
      const intervalMinutes = SRS_INTERVALS[srsData[key].level];
      srsData[key].nextReview = Date.now() + intervalMinutes * 60 * 1000;
      saveSRS();
    }
  }

  // Add to spell queue
  spellQueue.push({ ...card, _catId: catId });

  showDetail();
}

// ---------- Phase 2: Detail ----------
function showDetail() {
  studyPhase = 'detail';
  const card = studyCards[studyIndex];

  const checkColor = currentJudgment === 'know' ? 'green' : currentJudgment === 'fuzzy' ? 'orange' : 'red';
  const checkIcon = currentJudgment === 'know' ? '✓' : currentJudgment === 'fuzzy' ? '~' : '✕';

  const note = card.note || '';
  const example = card.example || note;
  const exampleCn = card.exampleCn || '';

  let html = `
    <div class="detail-word-row">
      <span class="detail-word">${escHtml(card.en)}</span>
      <span class="detail-check ${checkColor}">${checkIcon}</span>
    </div>
    <div class="detail-cn">${escHtml(card.cn)}</div>`;

  if (note) {
    html += `<div class="detail-note">${escHtml(note)}</div>`;
  }

  if (example) {
    // Bold the English word in the example
    const highlighted = escHtml(example).replace(
      new RegExp('(' + escHtml(card.en.split(/[\s\/()]+/)[0]) + ')', 'gi'),
      '<strong>$1</strong>'
    );
    html += `<div class="detail-example">
      <div class="detail-example-en">${highlighted}</div>
      ${exampleCn ? '<div class="detail-example-cn">' + escHtml(exampleCn) + '</div>' : ''}
    </div>`;
  }

  // Show collocations if available
  if (card.collocations && card.collocations.length > 0) {
    html += `<div class="detail-example">`;
    card.collocations.forEach(c => {
      html += `<div style="font-size:14px;color:var(--label);padding:3px 0;">${escHtml(c)}</div>`;
    });
    html += `</div>`;
  }

  document.getElementById('detail-area').innerHTML = html;
  document.getElementById('detail-area').scrollTop = 0;

  document.getElementById('phase-judge').style.display = 'none';
  document.getElementById('phase-detail').style.display = 'flex';
  document.getElementById('phase-spell').style.display = 'none';
}

function onDetailNext() {
  studyIndex++;
  wordsSinceSpell++;

  // Every SPELL_EVERY words, trigger spelling test
  if (wordsSinceSpell >= SPELL_EVERY && spellQueue.length > 0) {
    startSpellTest();
  } else {
    showJudge();
  }
}

function onDetailWrong() {
  // User realizes they were wrong — downgrade this word
  const card = studyCards[studyIndex];
  const catId = card._catId || currentCategory.id;
  reviewCard(catId, card.originalIndex, false);
  // Adjust counts
  if (currentJudgment === 'know') { studyKnown--; studyAgain++; }
  onDetailNext();
}

// ---------- Phase 3: Spelling Test ----------
function startSpellTest() {
  studyPhase = 'spell';
  spellIndex = 0;
  spellResults = [];
  wordsSinceSpell = 0;

  // Shuffle the spell queue for variety
  shuffleArray(spellQueue);

  document.getElementById('phase-judge').style.display = 'none';
  document.getElementById('phase-detail').style.display = 'none';
  document.getElementById('phase-spell').style.display = 'flex';

  showSpellWord();
}

function showSpellWord() {
  if (spellIndex >= spellQueue.length) {
    finishSpellTest();
    return;
  }

  const word = spellQueue[spellIndex];

  // Render dots
  let dots = '';
  for (let i = 0; i < spellQueue.length; i++) {
    let cls = 'spell-dot';
    if (i < spellIndex) cls += spellResults[i] ? ' correct' : ' wrong';
    else if (i === spellIndex) cls += ' active';
    dots += `<div class="${cls}"></div>`;
  }
  document.getElementById('spell-dots').innerHTML = dots;
  document.getElementById('spell-cn').textContent = word.cn;
  document.getElementById('spell-note').textContent = word.note || '';
  document.getElementById('spell-answer').textContent = '';

  const input = document.getElementById('spell-input');
  input.value = '';
  input.className = 'spell-input';
  input.disabled = false;
  setTimeout(() => input.focus(), 100);
}

function checkSpell() {
  const input = document.getElementById('spell-input');
  if (input.disabled) { nextSpellWord(); return; }

  const word = spellQueue[spellIndex];
  const userAnswer = input.value.trim().toLowerCase();
  const correct = userAnswer === word.en.trim().toLowerCase()
    || userAnswer === word.en.split(/[\s\/()]+/)[0].trim().toLowerCase();

  input.disabled = true;

  if (correct) {
    input.className = 'spell-input correct';
    document.getElementById('spell-answer').innerHTML = '<span style="color:var(--green)">✓ 正确！</span>';
    spellResults.push(true);

    // Bonus: level +1 for correct spelling
    const catId = word._catId || currentCategory.id;
    const key = srsKey(catId, word.originalIndex);
    if (srsData[key]) {
      srsData[key].level = Math.min(srsData[key].level + 1, SRS_INTERVALS.length - 1);
      srsData[key].nextReview = Date.now() + SRS_INTERVALS[srsData[key].level] * 60 * 1000;
      saveSRS();
    }
  } else {
    input.className = 'spell-input wrong';
    document.getElementById('spell-answer').innerHTML =
      '<span style="color:var(--red)">正确答案：</span><strong>' + escHtml(word.en) + '</strong>';
    spellResults.push(false);

    // Penalty: level back to 1
    const catId = word._catId || currentCategory.id;
    reviewCard(catId, word.originalIndex, false);
  }

  // Auto advance after 1.2s
  setTimeout(() => nextSpellWord(), 1200);
}

function nextSpellWord() {
  spellIndex++;
  showSpellWord();
}

function skipSpell() {
  const input = document.getElementById('spell-input');
  if (input.disabled) { nextSpellWord(); return; }

  const word = spellQueue[spellIndex];
  input.disabled = true;
  input.className = 'spell-input wrong';
  document.getElementById('spell-answer').innerHTML =
    '<span style="color:var(--red)">答案：</span><strong>' + escHtml(word.en) + '</strong>';
  spellResults.push(false);

  const catId = word._catId || currentCategory.id;
  reviewCard(catId, word.originalIndex, false);
  setTimeout(() => nextSpellWord(), 1200);
}

function hintSpell() {
  const word = spellQueue[spellIndex];
  const input = document.getElementById('spell-input');
  if (input.disabled) return;

  // Show first 2 letters as hint
  const hint = word.en.substring(0, Math.min(2, word.en.length));
  if (!input.value) input.value = hint;
  input.focus();
}

function finishSpellTest() {
  const correctCount = spellResults.filter(r => r).length;
  const totalCount = spellResults.length;

  // Clear spell queue
  spellQueue = [];

  // If there are more words to learn, continue
  if (studyIndex < studyCards.length) {
    showJudge();
  } else {
    showCompletion();
  }
}

function restartStudy() {
  studyIndex = 0;
  studyFlipped = false;
  studyKnown = 0;
  studyAgain = 0;
  wordsSinceSpell = 0;
  spellQueue = [];
  document.getElementById('completion-view').style.display = 'none';
  document.getElementById('study-main').style.display = 'flex';
  showJudge();
}

function shuffleCards() {
  if (!currentCategory) return;
  shuffleArray(studyCards);
  studyIndex = 0;
  wordsSinceSpell = 0;
  spellQueue = [];
  showJudge();
}

function showCompletion() {
  doCheckin();
  const checkin = getCheckinInfo();

  document.getElementById('completion-view').style.display = 'flex';
  document.getElementById('study-main').style.display = 'none';
  const total = studyCards.length;
  const pct = total ? Math.round(studyKnown / total * 100) : 0;

  let modeLabel = '本轮完成！';
  if (studyMode === 'review') modeLabel = '复习完成！';
  else if (studyMode === 'new') modeLabel = '新词学完了！';
  document.querySelector('.completion-title').textContent = modeLabel;

  document.getElementById('completion-sub').textContent =
    `你学习了 ${total} 张卡片，掌握了 ${pct}%`;
  document.getElementById('completion-stats').innerHTML = `
    <div class="completion-stat">
      <div class="completion-stat-num green">${studyKnown}</div>
      <div class="completion-stat-label">认识了</div>
    </div>
    <div class="completion-stat">
      <div class="completion-stat-num" style="color:var(--blue)">${total}</div>
      <div class="completion-stat-label">总共</div>
    </div>
    <div class="completion-stat">
      <div class="completion-stat-num red">${studyAgain}</div>
      <div class="completion-stat-label">再看看</div>
    </div>
  `;

  // 打卡信息
  const existingStreak = document.getElementById('completion-streak');
  if (existingStreak) existingStreak.remove();
  if (checkin.streak > 0) {
    const streakDiv = document.createElement('div');
    streakDiv.id = 'completion-streak';
    streakDiv.innerHTML = `
      <div style="margin-top:20px;padding:14px 20px;background:var(--bg2);border-radius:var(--radius);display:flex;align-items:center;gap:12px;width:100%;max-width:320px;">
        <span style="font-size:28px;">🔥</span>
        <div>
          <div style="font-size:18px;font-weight:700;color:var(--orange);">${checkin.streak} 天连续学习</div>
          <div style="font-size:12px;color:var(--gray);margin-top:2px;">今日：新词 ${checkin.todayNew} · 复习 ${checkin.todayReview}</div>
        </div>
      </div>`;
    document.getElementById('completion-stats').insertAdjacentElement('afterend', streakDiv);
  }

  studyMode = 'category';
  renderHome();
}

function onSearch(val) {
  const clearBtn = document.getElementById('search-clear-btn');
  clearBtn.classList.toggle('visible', val.length > 0);

  if (!val.trim()) {
    document.getElementById('search-results').innerHTML = `
      <div class="search-empty">
        <div class="search-empty-icon">🔎</div>
        <div class="search-empty-text">搜索词汇</div>
        <div class="search-empty-sub">支持英文、中文、备注</div>
      </div>`;
    return;
  }

  const q = val.trim().toLowerCase();
  const results = [];
  APP_DATA.forEach(cat => {
    cat.cards.forEach((card, i) => {
      if (card.en.toLowerCase().includes(q) ||
          card.cn.includes(q) ||
          (card.note && card.note.toLowerCase().includes(q))) {
        results.push({ cat, card, idx: i });
      }
    });
  });

  if (results.length === 0) {
    document.getElementById('search-results').innerHTML = `
      <div class="search-empty">
        <div class="search-empty-icon">😕</div>
        <div class="search-empty-text">没有找到结果</div>
        <div class="search-empty-sub">换个关键词试试</div>
      </div>`;
    return;
  }

  function hl(text, q) {
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return escHtml(text);
    return escHtml(text.slice(0, idx)) + '<mark>' + escHtml(text.slice(idx, idx + q.length)) + '</mark>' + escHtml(text.slice(idx + q.length));
  }

  document.getElementById('search-results').innerHTML = `
    <div class="word-list">
      ${results.slice(0, 60).map(({ cat, card, idx }) => `
        <div class="search-result-item" onclick="openSearchResult('${cat.id}', ${idx})">
          <div class="search-result-en">${hl(card.en, q)}</div>
          <div class="search-result-cn">${hl(card.cn, q)}</div>
          <div class="search-result-cat">${cat.icon} ${cat.name}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch('');
  document.getElementById('search-input').focus();
}

function openSearchResult(catId, idx) {
  startStudyAt(catId, idx);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// UTILS
// ============================================================
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  renderHome();
  history = ['screen-home'];

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // Keyboard shortcuts (desktop)
  document.addEventListener('keydown', e => {
    const studyActive = document.getElementById('screen-study').classList.contains('active');
    if (!studyActive) return;

    if (studyPhase === 'judge') {
      if (e.key === '1' || e.key === 'y') { e.preventDefault(); onJudge('know'); }
      if (e.key === '2' || e.key === 'f') { e.preventDefault(); onJudge('fuzzy'); }
      if (e.key === '3' || e.key === 'n') { e.preventDefault(); onJudge('forgot'); }
    } else if (studyPhase === 'detail') {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onDetailNext(); }
      if (e.key === 'x') { e.preventDefault(); onDetailWrong(); }
    }
    // spell phase uses the input field, no extra shortcuts needed
  });
}

init();
</script>
